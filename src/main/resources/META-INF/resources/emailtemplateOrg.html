<!DOCTYPE html>
<html>


<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
            font-size: 16px;
            color: #333333;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .email-container {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            border-radius: 8px;
            padding: 20px 30px;
            /* box-shadow: 0 4px 8px gainsboro; */
        }

        .email-body {
            font-size: 16px;
            line-height: 1.6;
            color: #444444;
            margin-bottom: 20px;
        }

        .email-footer {
            font-size: 14px;
            /* color: #777777; */
            color: green;
            border-top: 1px solid #e0e0e0;
            margin-top: 20px;
            padding-top: 10px;
        }
    </style>
</head>

<body>
    <div class="email-container">
        <div class="email-body">
            <!-- the comment in the next line will be use in the code as target to replace with the real message  -->
            <!-- Insert your message here -->
        </div>

        <div class="email-footer">
            Sauer Sitrone <br>
            www.sauer.sitrone.de
        </div>
    </div>

</html>
