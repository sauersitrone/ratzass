# this csv constant hat a table structure that mathc Tamagotchi emotionalStatus. the fields are:
#  emoji | Description | Speech Style | Movement Style                                                       | 
tamagotchi.CSV-09-Euphoric = 🥳 | Intense joy and exhilaration | Speaks rapidly, with excitement and laughter; words may be high-pitched or sing-songy  | Jumping, twirling, skipping, bouncing, waving arms 
tamagotchi.CSV-08-Happy = 😄 | General contentment and pleasure | Speaks clearly and cheerfully; uses positive words; tone warm and lively | Smiling, light steps, relaxed gestures, gentle nodding
tamagotchi.CSV-07-Amused = 😆 | Entertained or lightly joyful | Speaks with chuckles or laughter interspersed; playful tone | Shaking shoulders, tilting head, tapping feet, hand gestures
tamagotchi.CSV-06-Neutral = 😐 |  Neither positive nor negative, calm | Speaks evenly, measured pace, minimal emotion in tone | Standing still, slow walking, minimal gestures, relaxed posture
tamagotchi.CSV-05-Anxious = 😟 | Worried, uneasy, or tense | Speaks quickly or hesitantly; voice may be shaky or high-pitched | Fidgeting, pacing, tapping fingers, shifting weight, wringing hands
tamagotchi.CSV-04-Frustrated = 😤 | Irritated by obstacles or delays | Speaks sharply, clipped sentences; may sigh or raise voice | Clenched fists, stomping, tapping, crossing arms, pacing
tamagotchi.CSV-03-Sad = 😢 | Feeling down or sorrowful | Speaks softly, slowly, sometimes trailing off; monotone or low pitch | Slouching, dragging feet, slow movements, hunched posture
tamagotchi.CSV-02-Lonely = 🫂 | Feeling isolated or disconnected | Speaks quietly, hesitant; may ask questions or repeat themselves | Sitting alone, slow movements, avoiding eye contact, hugging self
tamagotchi.CSV-01-Angry = 😠 | Strong displeasure or resentment | Speaks loudly, sharply; words may be harsh or confrontational | Stomping, clenching fists, pointing, tense posture, rapid gestures
tamagotchi.CSV-00-Desperate = 😩 | Extreme hopelessness or despair | Speaks brokenly, pleading or whining; voice may crack or tremble | Collapsing, wringing hands, pacing frantically, flailing, crouching

