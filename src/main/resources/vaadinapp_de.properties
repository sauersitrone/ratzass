TIP_PAYMENT_METHOD.step-01-title = Zahlungsart
TIP_PAYMENT_METHOD.step-01-message = <p>sind die verschiedenen M&ouml;glichkeiten, wie Sie Spenden &uuml;ber unsere Convertion-Widget sammeln k&ouml;nnen. Je mehr Zahlungsarten Sie anbieten, desto flexibler sind Ihre Spendenm&ouml;glichkeiten.</p><p>Aktuell finden Sie hier noch keine Zahlungsarten, da Sie die M&ouml;glichkeit haben, neue Optionen hinzuzuf&uuml;gen.</p><p>Beginnen Sie jetzt und legen Sie Ihre eigenen Zahlungsarten an, um Spenden auf vielf&auml;ltige Weise zu akzeptieren. Wir freuen uns darauf, wie diese Vielfalt Ihnen bei der Spendenakquise helfen wird und wie Sie Ihre Spendenziele erreichen k&ouml;nnen.</p>
TIP_PAYMENT_METHOD.step-01-close = Got it, close
