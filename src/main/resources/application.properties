quarkus.http.port=8071
quarkus.live-reload.instrumentation=true
quarkus.banner.path=banner.txt
quarkus.default-locale = de
quarkus.locales = es,en,de

# Disable 2nd-level cache unless needed
quarkus.hibernate-orm.second-level-caching-enabled=false

# Disable statistics
quarkus.hibernate-orm.statistics=false

# quarkus.arc.detect-unused-beans=all Unrecognized configuration key
quarkus.arc.unremovable-types=de.simone.*

#----------------------------------------------
# LLM CONFIGURATION
#----------------------------------------------
# quarkus.langchain4j.log-requests=true
# quarkus.langchain4j.log-responses=true
quarkus.langchain4j.chat-memory.memory-window.max-messages=20

# quarkus.langchain4j.openai.chat-model.model-name=gpt-4o

quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-name=llama3.1
quarkus.langchain4j.ollama.chat-model.temperature=0 
quarkus.langchain4j.timeout=60s 

# quarkus.langchain4j.pgvector.datasource = postgresql
quarkus.langchain4j.pgvector.dimension=1536


#   CUSTOM PROPERTIES
#----------------------------------------------

# VAADIN
#----------------------------------------------
vaadin.frontend.hotdeploy=true
vaadin.launch-browser=true
vaadin.whitelisted-packages = de.simone,vaadin-addons

# DATASOURCE
#----------------------------------------------
quarkus.datasource.db-kind=postgresql  
quarkus.datasource.username=postgres
quarkus.datasource.password=sauersitrone
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:55464/zitrone

# HIBERNATE
#----------------------------------------------
quarkus.hibernate-orm.jdbc.timezone = UTC
quarkus.hibernate-orm.jdbc.statement-batch-size=20
# quarkus.hibernate-orm.log.sql=true
#quarkus.hibernate-orm.log.bind-parameters = true

quarkus.hibernate-orm.database.generation=update
# quarkus.hibernate-orm.database.generation=drop-and-create
# quarkus.hibernate-orm.database.generation=none
# quarkus.hibernate-orm.sql-load-script=db/initial-data.sql
