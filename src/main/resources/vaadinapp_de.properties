TIP_USERS.step-01-title = Nutzer
TIP_USERS.step-01-message = <p>Ein &#39;Benutzer&#39; in unserem System ist nicht nur eine Person, die das Privileg hat, das System zu verwalten und darauf zuzugreifen, sondern auch jemand, der die einzigartige M&ouml;glichkeit hat, andere Nutzer einzuladen und gemeinsam mit ihnen unsere Plattform zu gestalten.</p><p>Als Benutzer sind Sie der Schl&uuml;ssel zur Kontrolle und Anpassung Ihrer Erfahrung. Nutzen Sie Ihr Benutzerkonto, um nicht nur Ihre eigenen Bed&uuml;rfnisse zu erf&uuml;llen, sondern auch andere einzuladen und gemeinsam an der Erreichung unserer Ziele zu arbeiten.</p><p>Gemeinsam sind wir stark.</p>
TIP_USERS.step-01-close = Got it, close
TIP_USERS.step-01-point = 

TIP_ROLLE.step-01-title = Rolle
TIP_ROLLE.step-01-message = <p>In unserem System steht &#39;Rolle&#39; f&uuml;r die spezifische Funktion und die zugeh&ouml;rigen Berechtigungen, die einer Person zugeordnet sind. Jede Rolle definiert, welche Aufgaben eine Person ausf&uuml;hren kann und auf welche Teile des Systems sie Zugriff hat.</p><p>Als Nutzer haben Sie die F&auml;higkeit, verschiedenen Personen unterschiedliche Rollen zuzuweisen. Diese Rollen bestimmen, welche Verantwortlichkeiten und Berechtigungen eine Person innerhalb der Anwendung hat. Die Zuweisung von Rollen ist der Schl&uuml;ssel zur effizienten Verwaltung und Organisation unseres Systems. Nutzen Sie diese Funktion, um sicherzustellen, dass jeder Nutzer die richtigen Rechte und Verantwortlichkeiten hat, um unsere Ziele effektiv zu erreichen.</p>
TIP_ROLLE.step-01-close = Got it, close
TIP_ROLLE.step-01-point = 

TIP_NOTIFICATION_CHANNEL.step-01-title = Komunikationskanäle
TIP_NOTIFICATION_CHANNEL.step-01-message = <p>sind das Bindeglied zwischen den Nutzern, erm&ouml;glichen es Ihnen, miteinander zu kommunizieren und wichtige Nachrichten auszutauschen.</p><p>Momentan finden Sie hier noch keine Eintr&auml;ge, da Sie die M&ouml;glichkeit haben, einen neuen Kommunikationskanal zu erstellen.</p><p>Diese Kan&auml;le sind der Schl&uuml;ssel zur reibungslosen Kommunikation und zum Austausch von bedeutsamen Informationen. Legen Sie jetzt einen neuen Kommunikationskanal an und beginnen Sie, sinnvolle Gespr&auml;che zu f&uuml;hren.&nbsp;</p>
TIP_NOTIFICATION_CHANNEL.step-01-close = Got it, close
TIP_NOTIFICATION_CHANNEL.step-01-point = 

TIP_MAILING.step-01-title = Nachrichten
TIP_MAILING.step-01-message = <p>helfen Ihnen, verschiedene Mitteilungen an Ihre Unterst&uuml;tzer anzupassen. Sie dienen dazu, Ihren Dank und Ihre Anerkennung f&uuml;r erfolgreiche Spenden und Petitionen auszudr&uuml;cken.</p><p>Diese Muster sind der Ausdruck Ihrer Wertsch&auml;tzung und Anerkennung f&uuml;r die Unterst&uuml;tzung, die Sie erhalten. Beginnen Sie jetzt und legen Sie Ihr eigenes Muster an, um Ihren Nachrichten eine pers&ouml;nliche Note zu verleihen. Wir freuen uns auf Ihre kreativen Gestaltungen und darauf, wie sie Ihre Beziehungen zu Ihren Unterst&uuml;tzern bereichern werden.</p>
TIP_MAILING.step-01-close = Got it, close
